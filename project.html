<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projekt — Archiv</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <a class="back-link" href="index.html">Archiv</a>
  <h1 class="site-title" id="pageTitle">—</h1>
</header>

<main class="project-main" id="main"></main>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">Schliessen ✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<script src="data.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");
  const ex = exhibitions.find(e => e.id === id);
  const main = document.getElementById("main");
  const pageTitle = document.getElementById("pageTitle");

  if (!ex) {
    pageTitle.textContent = "Nicht gefunden";
    main.innerHTML = '<p class="empty-state">Dieses Projekt existiert nicht (mehr). <a href="index.html">Zurück zum Archiv</a>.</p>';
  } else {
    document.title = ex.title + " — Archiv";
    pageTitle.textContent = ex.title;

    let html = `
      <p class="project-meta">${ex.year}${ex.place ? " · " + ex.place : ""}${ex.medium ? " · " + ex.medium : ""}</p>
      <p class="project-description">${ex.description || ""}</p>
    `;

    if (ex.images && ex.images.length) {
      html += `<h2 class="section-label">Fotografien</h2><div class="plates" id="plates"></div>`;
    }

    if (ex.videos && ex.videos.length) {
      html += `<h2 class="section-label">Video</h2><div class="video-list" id="videos"></div>`;
    }

    main.innerHTML = html;

    // Bilder rendern
    if (ex.images && ex.images.length) {
      const platesEl = document.getElementById("plates");
      ex.images.forEach((src, i) => {
        const plate = document.createElement("div");
        plate.className = "plate";
        plate.innerHTML = `
          <img src="${src}" alt="${ex.title}, Ansicht ${i + 1}" loading="lazy">
          <span class="plate-index">${String(i + 1).padStart(2, "0")}</span>
        `;
        plate.addEventListener("click", () => openLightbox(src));
        platesEl.appendChild(plate);
      });
    }

    // Videos rendern
    if (ex.videos && ex.videos.length) {
      const videosEl = document.getElementById("videos");
      ex.videos.forEach(v => {
        const frame = document.createElement("div");
        frame.className = "video-frame";
        const embedSrc = v.platform === "vimeo"
          ? `https://player.vimeo.com/video/${v.id}`
          : `https://www.youtube-nocookie.com/embed/${v.id}`;
        frame.innerHTML = `<iframe src="${embedSrc}" title="Video" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
        videosEl.appendChild(frame);
      });
    }
  }

  // Lightbox
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightboxImg");

  function openLightbox(src) {
    lightboxImg.src = src;
    lightbox.classList.add("open");
  }
  function closeLightbox() {
    lightbox.classList.remove("open");
    lightboxImg.src = "";
  }
  document.getElementById("lightboxClose").addEventListener("click", closeLightbox);
  lightbox.addEventListener("click", e => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeLightbox(); });
</script>

</body>
</html>
