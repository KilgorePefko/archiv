<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recent Painting</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="sidebar-root"></div>

<div id="content">

  <!--
    KOPFBLOCK
    Zeile 1: Ausstellungstitel (kursiv)
    Zeile 2: Ausstellungsort, Stadt
    Zeile 3: Jahr
  -->
  <div class="block type2">
    <i>Recent Painting</i><br>
    Kandererstrasse 18, Basel<br>
    2026
  </div>

  <!-- Begleittext, kann auch weggelassen werden (ganzen Block löschen) -->
  <div class="block type2">
    Malereien bis zweitausendvierundzwanzig 1-3
  </div>

  <!--
    BILDER
    Bildunterschrift optional: Titel (kursiv), Jahr / Material / Grösse
    Zeile einfach weglassen, wenn nicht gebraucht.
  -->
  <div class="block">
    <img src="images/recentpainting/01.jpg" alt="Ansicht 1">
  </div>
  <div class="block">
    <img src="images/recentpainting/02.jpg" alt="Ansicht 2">
  </div>
  <div class="block">
    <img src="images/recentpainting/03.jpg" alt="Ansicht 3">
  </div>

  <!--
    Video einbetten: YouTube-Link kopieren, z.B. https://youtu.be/dQw4w9WgXcQ
    -> nur der Teil nach dem letzten "/" ist die ID: dQw4w9WgXcQ
    Block einkommentieren und ID ersetzen.

  <div class="block video-frame">
    <iframe src="https://www.youtube-nocookie.com/embed/DEINE-VIDEO-ID"
      title="Video" loading="lazy"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen></iframe>
  </div>

    Bei Vimeo (https://vimeo.com/76979871) stattdessen:
    src="https://player.vimeo.com/video/76979871"
  -->

</div>

<script src="sidebar.js"></script>
</body>
</html>
