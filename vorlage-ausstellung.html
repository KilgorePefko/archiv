<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ausstellungstitel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="sidebar-root"></div>

<div id="content">

  <!--
    KOPFBLOCK
    Zeile 1: Ausstellungstitel (kursiv)
    Zeile 2: Ausstellungsort, Stadt
    Zeile 3: Jahr
  -->
  <div class="block type2">
    <i>Ausstellungstitel</i><br>
    Ausstellungsort, Stadt<br>
    Jahr
  </div>

  <!--
    NUR BEI GRUPPENAUSSTELLUNGEN — bei Einzelausstellungen diesen
    ganzen Block löschen.
  -->
  <div class="block type2">
    Alongside: Name A, Name B, Name C
  </div>

  <!-- Begleittext, kann auch weggelassen werden (ganzen Block löschen) -->
  <div class="block type2">
    Kurzer Begleittext zur Ausstellung.
  </div>

  <!-- Optional: Link zu einem PDF mit Ausstellungstext -->
  <div class="block type2">
    <a href="ausstellungstext.pdf">Text</a>
  </div>

  <!--
    BILDER
    Blöcke duplizieren für mehr, löschen für weniger.
    Die Bildunterschrift (Titel, Jahr / Material / Grösse) ist optional
    — die <p class="caption">-Zeile einfach löschen, falls nicht
    gebraucht, z.B. bei reinen Installationsansichten.
    Schema: Titel (kursiv), Jahr / Material 1, Material 2 / BxHxT
  -->
  <div class="block">
    <img src="images/ORDNERNAME/01.jpg" alt="Ansicht 1">
    <p class="caption type2"><i>Werktitel</i>, Jahr / Material 1, Material 2 / 120 x 90 x 3 cm</p>
  </div>
  <div class="block">
    <img src="images/ORDNERNAME/02.jpg" alt="Ansicht 2">
    <p class="caption type2"><i>Werktitel</i>, Jahr / Material 1, Material 2 / 120 x 90 x 3 cm</p>
  </div>
  <div class="block">
    <img src="images/ORDNERNAME/03.jpg" alt="Ansicht 3">
  </div>

  <!--
    Video einbetten: YouTube-Link kopieren, z.B. https://youtu.be/dQw4w9WgXcQ
    -> nur der Teil nach dem letzten "/" ist die ID: dQw4w9WgXcQ
    Block einkommentieren und ID ersetzen.

  <div class="block video-frame">
    <iframe src="https://www.youtube-nocookie.com/embed/DEINE-VIDEO-ID"
      title="Video" loading="lazy"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen></iframe>
  </div>

    Bei Vimeo (https://vimeo.com/76979871) stattdessen:
    src="https://player.vimeo.com/video/76979871"
  -->

</div>

<script src="sidebar.js"></script>
</body>
</html>
